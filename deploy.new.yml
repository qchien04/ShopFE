name: Build & Deploy React

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: npm

      - run: npm install
      - run: npm run build

      - name: Test SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST2 }}
          username: ${{ secrets.SERVER_USER2 }}
          key: ${{ secrets.SSH_PRIVATE_KEY2 }}
          script: whoami

      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST2 }}
          username: ${{ secrets.SERVER_USER2 }}
          key: ${{ secrets.SSH_PRIVATE_KEY2 }}
          source: "dist/*"
          target: "/projects/shopfe/"
          